<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정 탐정 · 지금 내 마음의 단서를 찾아서</title>
<style>
  :root{
    --bg:#F7F4EF; --surface:#FFFFFF; --ink:#2B2A33; --ink-soft:#5C5A66;
    --primary:#3E4C7A; --primary-soft:#E7EAF4; --accent:#D98E5A;
    --calm:#7FBFA6; --danger:#C0453B; --danger-bg:#FBEDEB; --line:#E5E0D8;
    --shadow:0 6px 24px rgba(43,42,51,.08);
    --radius:20px; --radius-btn:14px; --maxw:560px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#201F26; --surface:#2A2933; --ink:#F0EEE9; --ink-soft:#B4B1BD;
      --primary:#9DA9DA; --primary-soft:#33324062; --accent:#E7A46F;
      --calm:#8FCFB4; --danger:#E9897F; --danger-bg:#3A2320; --line:#3A3945;
      --shadow:0 6px 24px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    font-size:17px; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:16px 20px 40px; min-height:100vh; display:flex; flex-direction:column;}
  header.topbar{display:flex; align-items:center; justify-content:space-between; padding:8px 0 14px;}
  .brand{display:flex; align-items:center; gap:8px; font-weight:700; color:var(--primary); font-size:18px;}
  .brand .glass{font-size:22px;}
  .help-btn{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer;
  }
  .help-btn:hover{border-color:var(--danger); color:var(--danger);}
  .card{background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:26px 22px; margin-top:6px;}
  h1{font-size:26px; line-height:1.35; margin:0 0 10px;}
  h2{font-size:22px; line-height:1.4; margin:0 0 6px; font-weight:600;}
  p{margin:0 0 12px;}
  .muted{color:var(--ink-soft); font-size:14px;}
  .caption{color:var(--ink-soft); font-size:13px; line-height:1.6;}
  .btn{
    display:block; width:100%; min-height:52px; border-radius:var(--radius-btn);
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    font-size:17px; font-weight:600; cursor:pointer; padding:12px 16px; margin-top:10px;
    transition:transform .12s ease, background .2s ease, border-color .2s ease;
  }
  .btn:hover{border-color:var(--primary);}
  .btn:active{transform:scale(.99);}
  .btn.primary{background:var(--primary); color:#fff; border-color:var(--primary);}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.ghost{background:transparent;}
  .btn.small{min-height:44px; font-size:15px; font-weight:500;}
  .btn-row{display:flex; gap:10px;}
  .btn-row .btn{margin-top:10px;}
  .yesno{display:flex; gap:12px; margin-top:18px;}
  .yesno .btn{margin-top:0;}
  .skip{margin-top:12px; text-align:center;}
  .skip button{background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-size:14px;}
  .choice-grid{display:grid; gap:10px; margin-top:18px;}
  .btn.choice-btn{
    display:grid; grid-template-columns:34px 1fr; gap:10px; align-items:start;
    min-height:auto; text-align:left; line-height:1.55; margin-top:0; padding:14px 15px;
  }
  .choice-letter{
    display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
    border-radius:999px; background:var(--primary-soft); color:var(--primary); font-weight:800; font-size:14px;
  }
  .choice-copy b{display:block; margin-top:5px; color:var(--ink-soft); font-size:14px; font-weight:700;}
  .choice-copy span{display:block; color:var(--ink); font-size:18px; font-weight:800; line-height:1.45;}
  .choice-actions{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
  .choice-actions .btn{margin-top:0; min-height:42px; font-size:14px; font-weight:500;}
  .progress{height:8px; background:var(--primary-soft); border-radius:999px; overflow:hidden; margin:2px 0 4px;}
  .progress > i{display:block; height:100%; background:var(--accent); width:0; transition:width .35s ease;}
  .clue-count{font-size:13px; color:var(--accent); font-weight:600; letter-spacing:.2px;}
  .likert{display:flex; gap:8px; margin-top:16px;}
  .likert .btn{margin-top:0; min-height:60px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:15px;}
  .likert .btn small{font-size:11px; color:var(--ink-soft); font-weight:400;}
  /* result */
  .barrow{margin:14px 0;}
  .barrow .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;}
  .barrow .em{font-weight:700; font-size:19px;}
  .barrow .pct{font-variant-numeric:tabular-nums; color:var(--ink-soft); font-weight:600;}
  .bar{height:14px; border-radius:999px; background:var(--primary-soft); overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:999px; transition:width .5s ease;}
  .badge{display:inline-block; padding:4px 10px; border-radius:999px; font-size:13px; font-weight:600;}
  .badge.high{background:#E4F1EA; color:#2f7a5b;}
  .badge.mid{background:#FBF0DF; color:#9a6a2a;}
  .badge.low{background:#EDEBF3; color:#5a5480;}
  @media (prefers-color-scheme: dark){
    .badge.high{background:#22392f;color:#8fcfb4;} .badge.mid{background:#3a3122;color:#e7a46f;} .badge.low{background:#302f3d;color:#b4b1bd;}
  }
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 4px;}
  .chip{background:var(--primary-soft); color:var(--primary); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:600;}
  .insight{background:var(--primary-soft); border-radius:14px; padding:14px 16px; margin:14px 0;}
  .insight h3{margin:0 0 4px; font-size:15px; color:var(--primary);}
  .insight p{margin:0; font-size:15px;}
  /* 12살도 이해하는 쉬운 설명 칸 */
  .kidbox{background:#FBF3E4; border:1px solid #EAD9B8; border-radius:14px; padding:14px 16px; margin:14px 0;}
  .kidbox h3{margin:0 0 6px; font-size:15px; color:#9a6a2a;}
  .kidbox p{margin:0; font-size:15px; line-height:1.6; color:#4a3f2e;}
  @media (prefers-color-scheme: dark){ .kidbox{background:#332a1a; border-color:#5a4a2a;} .kidbox h3{color:#e7c98a;} .kidbox p{color:#e8dcc4;} }
  :root[data-theme="dark"] .kidbox{background:#332a1a; border-color:#5a4a2a;} :root[data-theme="dark"] .kidbox h3{color:#e7c98a;} :root[data-theme="dark"] .kidbox p{color:#e8dcc4;}
  :root[data-theme="light"] .kidbox{background:#FBF3E4; border-color:#EAD9B8;} :root[data-theme="light"] .kidbox h3{color:#9a6a2a;} :root[data-theme="light"] .kidbox p{color:#4a3f2e;}
  .detail-hint{margin-top:8px;}
  .detail-hint-list{display:grid; gap:6px; margin-top:6px;}
  .detail-hint-item{border:1px solid var(--line); border-radius:12px; padding:9px 10px; font-size:13px; line-height:1.45; background:var(--surface);}
  .detail-hint-item b{display:block; color:var(--primary); font-size:14px;}
  .detailbox{border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin:14px 0; background:transparent;}
  .detailbox h3{margin:0 0 5px; font-size:15px; color:var(--primary);}
  .detailbox p{margin:0; font-size:15px; line-height:1.6;}
  .detail-options{display:grid; gap:8px; margin-top:10px;}
  .btn.detail-option{display:block; width:100%; min-height:auto; margin:0; padding:11px 12px; border-radius:12px; text-align:left; font-size:14px; font-weight:500; line-height:1.45;}
  .btn.detail-option strong{display:block; font-size:15px;}
  .btn.detail-option span{display:block; margin-top:3px; color:var(--ink-soft); font-size:13px; font-weight:400;}
  .btn.detail-option.active{background:var(--primary-soft); border-color:var(--primary); color:var(--ink);}
  .needwords{border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin:14px 0; background:transparent;}
  .needwords h3{margin:0 0 8px; font-size:15px; color:var(--primary);}
  .need-word-list{display:flex; flex-direction:column; gap:8px;}
  .need-word{border:1px solid var(--line); border-radius:12px; padding:9px 10px; font-size:14px; line-height:1.5;}
  .need-word b{display:block; margin-bottom:2px;}
  .need-word span{color:var(--ink-soft);}
  .profile{border:1px solid var(--line); border-radius:18px; padding:16px 15px; margin:14px 0; background:var(--surface);}
  .profile h3{font-size:19px; margin:0 0 6px; color:var(--primary);}
  .profile h4{font-size:15px; margin:16px 0 6px; color:var(--primary);}
  .profile p{font-size:15px; line-height:1.65; margin:0 0 9px;}
  .profile ul{margin:6px 0 0; padding-left:20px;}
  .profile li{font-size:14px; line-height:1.6; margin:3px 0;}
  .profile .quote{border-left:3px solid var(--accent); padding:6px 0 6px 10px; color:var(--ink-soft); font-size:14px; margin:8px 0;}
  .need-grid{display:grid; gap:8px; margin-top:8px;}
  .need-card{border:1px solid var(--line); border-radius:13px; padding:10px 11px; background:var(--surface);}
  .need-card b{display:block; color:var(--primary);}
  .need-card span{display:block; color:var(--ink-soft); font-size:14px; line-height:1.55; margin-top:3px;}
  .need-card em{display:block; font-style:normal; font-size:13px; color:var(--ink-soft); margin-top:5px;}
  .check-options{display:grid; gap:7px; margin-top:7px;}
  .check-option{border:1px solid var(--line); border-radius:12px; padding:8px 10px; font-size:14px; line-height:1.5; background:var(--surface);}
  .soft-note{color:var(--ink-soft); font-size:14px; line-height:1.6; margin-top:8px;}
  .result-section{border-top:1px solid var(--line); padding-top:16px; margin-top:18px;}
  .result-section h3{font-size:18px; margin:0 0 8px; color:var(--primary);}
  .result-section h4{font-size:15px; margin:14px 0 5px; color:var(--primary);}
  .result-section ul{margin:8px 0 0; padding-left:20px;}
  .result-section li{font-size:14px; line-height:1.6; margin:4px 0;}
  .flow-box{display:grid; gap:8px; margin-top:10px;}
  .flow-box div{border:1px solid var(--line); border-radius:13px; padding:9px 11px; font-size:14px; line-height:1.55; background:var(--surface);}
  .flow-box div:not(:last-child)::after{content:"↓"; display:block; color:var(--accent); font-weight:800; margin-top:6px;}
  .result-confirm{display:grid; gap:8px; margin-top:10px;}
  .result-confirm .btn{margin-top:0;}
  .result-confirm .btn.active{background:var(--primary-soft); border-color:var(--primary); color:var(--ink);}
  .log-recent{margin:14px 0 4px;}
  .log-recent h3{font-size:15px; margin:0 0 8px; color:var(--primary);}
  .log-card{border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-top:8px;}
  .log-title{display:flex; justify-content:space-between; gap:10px; font-size:14px; font-weight:700;}
  .log-kid{background:#FBF3E4; border:1px solid #EAD9B8; border-radius:12px; padding:10px 12px; margin-top:8px; font-size:13px; line-height:1.55; color:#4a3f2e;}
  @media (prefers-color-scheme: dark){ .log-kid{background:#332a1a; border-color:#5a4a2a; color:#e8dcc4;} }
  .log-list{display:grid; gap:12px; margin:14px 0;}
  .log-list h3{font-size:15px; margin:0; color:var(--primary);}
  .log-empty{border:1px dashed var(--line); border-radius:14px; padding:16px 14px; color:var(--ink-soft); font-size:14px; line-height:1.6;}
  .log-result-card{
    appearance:none; width:100%; text-align:left; border:1px solid var(--line);
    border-radius:18px; background:var(--surface); color:var(--ink); padding:16px 15px;
    cursor:pointer; box-shadow:0 4px 16px rgba(43,42,51,.06);
    transition:transform .12s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .log-result-card:hover{border-color:var(--primary); box-shadow:var(--shadow);}
  .log-result-card:focus-visible{outline:2px solid var(--primary); outline-offset:3px;}
  .log-result-card:active{transform:scale(.995);}
  .log-result-card .barrow{margin:10px 0 8px;}
  .log-result-card .barrow .em{font-size:18px;}
  .log-result-card .insight, .log-result-card .kidbox{margin:10px 0 0;}
  .log-card-action{display:flex; justify-content:flex-end; color:var(--primary); font-size:13px; font-weight:700; margin-top:10px;}
  .log-detail-meta{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 14px;}
  .log-detail-meta span{border:1px solid var(--line); border-radius:999px; padding:3px 9px; color:var(--ink-soft); font-size:12px;}
  .log-top3{border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin:14px 0;}
  .log-top3 h3{margin:0 0 8px; font-size:15px; color:var(--primary);}
  .log-answer-list{border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin:14px 0;}
  .log-answer-list h3{margin:0 0 8px; font-size:15px; color:var(--primary);}
  .log-answer-list ol{margin:0; padding-left:20px;}
  .log-answer-list li{font-size:13px; line-height:1.55; margin:4px 0; color:var(--ink-soft);}
  .log-safe{border:1.5px solid var(--danger); background:var(--danger-bg); border-radius:18px; padding:18px 16px; margin:14px 0;}
  .log-safe h3{margin:0 0 6px; color:var(--danger); font-size:18px;}
  .notice{border:1px solid var(--line); border-radius:14px; padding:12px 14px; font-size:13px; color:var(--ink-soft); margin-top:14px;}
  .yellow-banner{background:#FBF3E4; border:1px solid #EAD9B8; color:#7a5a1f; border-radius:14px; padding:12px 14px; font-size:14px; margin:14px 0;}
  @media (prefers-color-scheme: dark){ .yellow-banner{background:#332a1a;border-color:#5a4a2a;color:#e7c98a;} }
  .confirm-opts{display:flex; flex-direction:column; gap:8px; margin-top:10px;}
  .confirm-opts .btn{margin-top:0;}
  .btn-desc{display:block; margin-top:4px; color:var(--ink-soft); font-size:13px; line-height:1.45; font-weight:400;}
  .refine{display:flex; gap:8px; margin-top:10px;}
  .refine input{flex:1; min-height:48px; border:1px solid var(--line); border-radius:var(--radius-btn); padding:0 14px; font-size:16px; background:var(--surface); color:var(--ink);}
  /* crisis */
  .crisis{background:var(--danger-bg); border:1.5px solid var(--danger);}
  .crisis h2{color:var(--danger);}
  .hotline{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface); border:1px solid var(--danger); border-radius:14px;
    padding:14px 16px; margin-top:10px; text-decoration:none; color:var(--ink);
  }
  .hotline .num{font-size:22px; font-weight:800; color:var(--danger); font-variant-numeric:tabular-nums;}
  .hotline .nm{font-size:14px;}
  footer.foot{margin-top:auto; padding-top:22px; text-align:center;}
  footer.foot .disc{font-size:12px; color:var(--ink-soft); line-height:1.6;}
  footer.foot a.helplink{color:var(--danger); font-weight:600; text-decoration:none; font-size:14px;}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(20,19,25,.5); display:none; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .overlay.on{display:flex;}
  .modal{background:var(--surface); border-radius:var(--radius); max-width:520px; width:100%; max-height:88vh; overflow:auto; padding:22px;}
  .modal h2{font-size:20px;}
  .kv{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); font-size:15px;}
  .hidden{display:none !important;}
  /* print */
  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    .wrap{max-width:100%; padding:0;}
    .card{box-shadow:none; border:1px solid #ccc;}
    .print-only{display:block !important;}
    .rpwrap{box-shadow:none; padding:0;}
  }
  .print-only{display:none;}
  /* 내 기록 리포트: 흰 종이 카드(화면·인쇄 동일), 모바일에서 한눈에 */
  .rpwrap{background:#fff; color:#1a1a1a; border-radius:var(--radius); box-shadow:var(--shadow); padding:22px 18px;}
  .rpwrap .rp h1{font-size:21px; margin:0 0 2px;}
  .rpwrap .gen{font-size:12px; color:#777; margin-bottom:14px;}
  .rpwrap .rsum{display:flex; gap:10px; margin-bottom:16px;}
  .rpwrap .rsum > div{flex:1; background:#F3F1EC; border-radius:14px; padding:10px 6px; text-align:center;}
  .rpwrap .rsum b{display:block; font-size:19px; font-variant-numeric:tabular-nums;}
  .rpwrap .rsum span{font-size:11px; color:#777;}
  .rpwrap .rcard{border:1px solid #ece9e3; border-radius:14px; padding:13px 14px; margin-bottom:10px; page-break-inside:avoid;}
  .rpwrap .rc-date{font-size:12px; color:#8a8a8a; margin-bottom:7px;}
  .rpwrap .rc-head{display:flex; align-items:center; gap:9px;}
  .rpwrap .rc-dot{width:13px; height:13px; border-radius:50%; flex:none;}
  .rpwrap .rc-emo{font-size:19px; font-weight:800; letter-spacing:-.2px;}
  .rpwrap .rc-pct{margin-left:auto; font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; color:#555;}
  .rpwrap .rc-bar{display:flex; height:9px; border-radius:999px; overflow:hidden; margin:9px 0 7px; background:#eee;}
  .rpwrap .rc-bar span{display:block; height:100%;}
  .rpwrap .rc-others{font-size:12px; color:#999; margin-bottom:4px;}
  .rpwrap .rc-need{font-size:14px; color:#333;}
  .rpwrap .rc-kid{background:#FBF3E4; border:1px solid #EAD9B8; border-radius:10px; padding:9px 10px; margin-top:8px; font-size:12px; line-height:1.55; color:#4a3f2e;}
  .rpwrap .rc-kid b{color:#7a5a1f;}
  .rpwrap .rc-sub{font-size:12px; color:#7a7a7a; margin-top:6px;}
  .rpwrap .rc-safe{font-size:14px; color:#9a9a9a;}
  .rpwrap .rp-empty{color:#777;}
  .rpwrap .foot{margin-top:16px; font-size:11px; color:#888; border-top:1px solid #ddd; padding-top:10px; line-height:1.6;}
  .rpbtns{display:flex; gap:10px; margin-top:18px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar no-print">
    <div class="brand"><span class="glass">🔍</span><span>감정 탐정</span></div>
    <button class="help-btn" id="helpBtn" aria-label="도움 연결 정보 열기">도움이 필요해요</button>
  </header>

  <main id="app"><!-- screens rendered here --></main>

  <footer class="foot no-print">
    <p class="disc">이 서비스는 감정 이해와 자기기록을 돕는 정보제공 도구이며, 의료적 진단이나 치료를 대신하지 않습니다.<br>
    힘들 때는 언제든 <a class="helplink" id="footHelp" href="#">109 · 1577-0199 · 1388 · 119</a></p>
  </footer>
</div>

<!-- 도움 정보 오버레이 -->
<div class="overlay no-print" id="helpOverlay">
  <div class="modal">
    <h2 style="color:var(--danger)">지금 도움이 필요하다면</h2>
    <p class="caption">이 서비스는 응급 개입을 대신할 수 없습니다. 아래로 바로 연락할 수 있어요. (24시간)</p>
    <a class="hotline" href="tel:109"><span class="nm">자살예방상담전화</span><span class="num">109</span></a>
    <a class="hotline" href="tel:15770199"><span class="nm">정신건강위기상담전화</span><span class="num">1577-0199</span></a>
    <a class="hotline" href="tel:1388"><span class="nm">청소년전화</span><span class="num">1388</span></a>
    <a class="hotline" href="tel:119"><span class="nm">응급</span><span class="num">119</span></a>
    <button class="btn ghost small" id="helpClose" style="margin-top:16px;">닫기</button>
  </div>
</div>

<!-- 내 기록 오버레이 -->
<div class="overlay no-print" id="logOverlay">
  <div class="modal">
    <h2>내 기록 · 결과 보기</h2>
    <p class="caption">각 기록은 결과창 형태로 저장됩니다. 하나를 누르면 상세 결과를 다시 보고, 그 기록만 PDF로 저장할 수 있어요.</p>
    <div id="logStats"></div>

const NEG = EMOTIONS.filter(e=>e.v<0).map(e=>e.id);
let LITERARY_EMOTIONS = Array.isArray(window.LITERARY_EMOTION_DICTIONARY) ? window.LITERARY_EMOTION_DICTIONARY : [];
let LITERARY_BY_CORE = groupLiteraryEmotions(LITERARY_EMOTIONS);

function groupLiteraryEmotions(items){
  const grouped={}; IDS.forEach(id=>grouped[id]=[]);
  for(const item of items || []){
    if(item && grouped[item.core]) grouped[item.core].push(item);
  }
  return grouped;
}
async function loadEmotionDatabase(){
  try{
    const res = await fetch('/api/emotions', {headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('emotion api failed');
    const data = await res.json();
    const items = Array.isArray(data.emotions) ? data.emotions : [];
    if(items.length){
      LITERARY_EMOTIONS = items;
      LITERARY_BY_CORE = groupLiteraryEmotions(items);
    }
  }catch(e){
    LITERARY_BY_CORE = groupLiteraryEmotions(LITERARY_EMOTIONS);
  }
}

const STRONG_DETAIL_WORDS = ['매우','몹시','깊','강','크게','폭발','사무치','끝이 없다','하늘'];
const SOFT_DETAIL_WORDS = ['은근','잔잔','가볍','조용','살짝','조금','편안','고요'];

function detailMatches(detail, words){
  const haystack = `${detail.term} ${detail.kid}`;
  return words.reduce((score, word)=>score + (haystack.includes(word) ? 1 : 0), 0);
}
function answerKey(answer){
  if(answer==='yes') return 'a';
  if(answer==='no') return 'b';
  if(answer==='a' || answer==='b' || answer==='mixed' || answer==='neither' || answer==='skip') return answer;
  return answer;
}
function detailWordsForAnswer(answer){
  const key = answerKey(answer.answer);
  const hints = DETAIL_HINTS[answer.qid];
  if(!hints) return [];
  if(Array.isArray(hints)) return key==='a' ? hints : [];
  return hints[key] || [];
}
function detailCandidates(coreId, limit=3){
  const list = (LITERARY_BY_CORE[coreId] || []).slice();
  if(!list.length){
    const fallback = EMAP[coreId];
    return fallback ? [{id:`core_${coreId}`, term:fallback.name, kid:fallback.kid, core:coreId, section:'핵심 감정'}] : [];
  }
  const selectedAnswers = S.answers.filter(answer=>['a','b','yes','no'].includes(answerKey(answer.answer)));
  return list.map(detail=>{
    let score=0;
    for(const answer of selectedAnswers) score += detailMatches(detail, detailWordsForAnswer(answer)) * 2;
    if(S.intensity>=3) score += detailMatches(detail, STRONG_DETAIL_WORDS);
    if(S.intensity!=null && S.intensity<=1) score += detailMatches(detail, SOFT_DETAIL_WORDS);
    if(detail.section && !/^[ㄱ-ㅎ]$/.test(detail.section)) score += 0.5;
    score += 1 / (detail.no + 1000);
    return {...detail, score};
  }).sort((a,b)=>b.score-a.score || a.no-b.no).slice(0,limit);
}
function detailListHTML(coreId, limit=2){
  const details = detailCandidates(coreId, limit);
  if(!details.length) return '';
  return `<div class="caption detail-hint">사전 후보와 쉬운 뜻</div>
    <div class="detail-hint-list">
      ${details.map(detail=>`<div class="detail-hint-item"><b>${safeText(detail.term)}</b>${safeText(detail.kid)}</div>`).join('')}
    </div>`;
}
function selectedDetail(){
  if(S.detailEmotion) return S.detailEmotion;
  const coreId = S.confirmedEmotion || S.userConfirmed || ranked(softmax(S.logscore))[0]?.id;
  const first = detailCandidates(coreId, 1)[0] || null;
  S.detailEmotion = first;
  return first;
}

function groupNeedWords(items){
  const grouped=Object.fromEntries(NEED_IDS.map(id=>[id,[]]));
  for(const item of items || []){
    const needs=Array.isArray(item.needs) ? item.needs : [];
    for(const needId of needs){
      if(grouped[needId]) grouped[needId].push(item);
    }
  }
  return grouped;
}
async function loadNeedWordDatabase(){
  if(location.hostname.endsWith('github.io')) return;
  try{
    const res = await fetch('/api/needs', {headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('need api failed');
    const data = await res.json();
    const items = Array.isArray(data.needWords) ? data.needWords : [];
    if(items.length){
      NEED_WORDS = items;
      NEED_WORDS_BY_NEED = groupNeedWords(items);
    }
  }catch(e){
    NEED_WORDS_BY_NEED = groupNeedWords(NEED_WORDS);
  }
}
function needWordMatches(item, words){
  const haystack = `${item.term} ${item.kid} ${item.section}`;
  return words.reduce((score, word)=>score + (haystack.includes(word) ? 1 : 0), 0);
}
function allowedNeedWord(item){
  const haystack = `${item.term || ''} ${item.kid || ''}`;
  return !FORBIDDEN_NEED_WORDS.some(word=>haystack.includes(word));
}
function needWordCandidates(needId, limit=5){
  const list=(NEED_WORDS_BY_NEED[needId] || []).filter(allowedNeedWord).slice();
  if(!list.length) return [];
  const hints=NEED_HINTS[needId] || [];
  return list.map(item=>{
    let score=5;
    score += needWordMatches(item, hints) * 3;
    score += NEED_WORD_KIND_BONUS[item.kind] || 0;
    if(item.term && item.term.length<=12) score += 0.4;
    if(item.term && item.term.length>22) score -= 0.3;
    score += 1 / (item.no + 1000);
    return {...item, score};
  }).sort((a,b)=>b.score-a.score || a.no-b.no).slice(0,limit);
}

function takeItems(items, limit=5){

function selectedNeedIdsFromAnswers(needAnswers){
  const ids=[];
  for(const answer of needAnswers || []){
    const key=answerKey(answer.answer);
    if(answer.selectedNeed && NEEDS[answer.selectedNeed]) ids.push(answer.selectedNeed);
    else if(key==='a' && NEEDS[answer.needA]) ids.push(answer.needA);
    else if(key==='b' && NEEDS[answer.needB]) ids.push(answer.needB);
    else if(key==='mixed'){
      if(NEEDS[answer.needA]) ids.push(answer.needA);
      if(NEEDS[answer.needB]) ids.push(answer.needB);
    }else if(answer.answer==='yes' && NEEDS[answer.need]) ids.push(answer.need);
  }
  return uniqueIds(ids);

function evidenceFromAnswers(answers, limit=5){
  return takeItems((answers || [])
    .filter(answer=>QMAP[answer.qid] && answer.qid!=='q_intensity')
    .map(answer=>{
      const q = QMAP[answer.qid];
      const key = answerKey(answer.answer);
      if(key==='a' || key==='b') return `“${choiceText(q, key)}” 쪽이 더 가깝다고 답했어요.`;
      if(key==='mixed') return `“${q.a}”와 “${q.b}”가 둘 다 비슷하다고 답했어요.`;
      if(key==='neither') return `“${q.a}”와 “${q.b}”가 둘 다 아닌 것 같다고 답했어요.`;
      return '';
    }).filter(Boolean), limit);
}
function evidenceFromNeedAnswers(needAnswers, limit=5){
  return takeItems((needAnswers || [])
    .map(answer=>{
      const key = answerKey(answer.answer);
      if(answer.needA && answer.needB){
        const needA = NEEDS[answer.needA], needB = NEEDS[answer.needB];
        if(key==='a' || key==='b'){
          const selectedNeed = key==='a' ? needA : needB;
          return `${selectedNeed.name} 쪽이 더 가깝다고 답했어요. “${answer.choiceText || selectedNeed.kid}”`;
        }
        if(key==='mixed') return `${needA.name}와 ${needB.name}가 둘 다 비슷하다고 답했어요.`;
        if(key==='neither') return `${needA.name}와 ${needB.name}가 둘 다 아닌 것 같다고 답했어요.`;
      }
      if(answer.answer==='yes' && NEED_EVIDENCE[answer.need]) return NEED_EVIDENCE[answer.need];
      return '';
    }).filter(Boolean), limit);
}
function answerConnectionForNeed(needId, needAnswers, positive){
  const answer = (needAnswers || []).find(item=>item.selectedNeed===needId || item.need===needId || item.needA===needId || item.needB===needId);
  if(answer && answer.needA && answer.needB){
    const key = answerKey(answer.answer);
    if(answer.selectedNeed===needId) return `이 욕구가 더 가까운 쪽이라고 골랐어요. “${answer.choiceText || NEEDS[needId].kid}”`;
    if(key==='mixed') return '이 욕구와 다른 욕구가 둘 다 비슷하다고 답했어요. 그래서 가능성으로 함께 남겨 두었어요.';
    if(key==='neither') return '비교한 두 욕구가 모두 아닌 것 같다고 답했어요. 그래서 확정하지 않고 낮은 가능성으로만 보았어요.';

function naturalJoin(items){
  const values=[...new Set((items || []).filter(Boolean))];
  if(values.length<=1) return values[0] || '';
  if(values.length===2) return `${values[0]}과 ${values[1]}`;
  return `${values.slice(0,-1).join(', ')}, 그리고 ${values[values.length-1]}`;
}

  if(key==='b') return [answer.choiceText || q.b].filter(Boolean);
  if(key==='mixed') return [q.a,q.b].filter(Boolean);
  return [];
}

/* ---- 가중치·파라미터 (고시_추론엔진_가중치설정 v1.3) ---- */
const P_BOOST=0.88, P_SUPPRESS=0.12, P_CONTEXT=0.65, P_NEUTRAL=0.5;
const CONF_HIGH_P1=0.55, CONF_HIGH_GAP=0.15, CONF_MID_P1=0.40, MIX_GAP=0.12;
const MIN_STEPS_EARLY=6, HARD_CAP=10;

function pChoiceA(q, id){
  if(!q || q.scored===false) return P_NEUTRAL;
  const high = q.strength==='weak' ? P_CONTEXT : P_BOOST;
  const low = 1 - high;
  if(q.aBoost && q.aBoost.includes(id)) return high;
  if(q.bBoost && q.bBoost.includes(id)) return low;
  return P_NEUTRAL;
}
function isEmotionAnswerChoice(answer){
  return answerKey(answer)==='a' || answerKey(answer)==='b' || answerKey(answer)==='yes' || answerKey(answer)==='no';
}
function answeredChoice(qid){
  const answer = S.answers.find(item=>item.qid===qid);
  return answer ? answerKey(answer.answer) : null;
}
function questionApplies(q){
  if(q.route==='negative') return answeredChoice('q_valence')==='a' || answeredChoice('q_valence')==='yes';
  if(q.route==='positive') return answeredChoice('q_valence')==='b' || answeredChoice('q_valence')==='no';
  return true;
}
function softmax(logscore){
  const vals = IDS.map(id=>logscore[id]||0);
  const mx = Math.max(...vals);
  const exps = vals.map(x=>Math.exp(x-mx));
  const sum = exps.reduce((a,b)=>a+b,0);
  const out={}; IDS.forEach((id,i)=>out[id]=exps[i]/sum); return out;
}
function entropy(post){
  let h=0; for(const id of IDS){ const p=post[id]; if(p>1e-9) h -= p*Math.log(p);} return h;
}
function ranked(post){
  return IDS.map(id=>({id,p:post[id]})).sort((x,y)=>y.p-x.p);
}
function confidenceOf(post){
  const r = ranked(post); const p1=r[0].p, p2=r[1].p;
  if(p1>=CONF_HIGH_P1 && (p1-p2)>=CONF_HIGH_GAP) return {level:'높음', cls:'high', p1,p2};
  if(p1>=CONF_MID_P1) return {level:'보통', cls:'mid', p1,p2};
  return {level:'낮음', cls:'low', p1,p2};
}
/* 정보이득: 남은 동적 문항 중 기대 엔트로피 감소 최대 */
function nextDynamic(post, asked){
  const branchId = (answeredChoice('q_valence')==='b' || answeredChoice('q_valence')==='no') ? 'q_what_pleasant' : 'q_what_unpleasant';
  if(DMAP[branchId] && !asked.has(branchId)) return DMAP[branchId];
  const H0 = entropy(post);
  let best=null, bestGain=-Infinity;
  for(const q of DYNAMIC){
    if(asked.has(q.id)) continue;
    if(!questionApplies(q)) continue;
    let choiceProbability=0; for(const id of IDS) choiceProbability += post[id]*pChoiceA(q,id);
    // 가상 갱신 후 분포
    const postA={}, postB={}; let sumA=0,sumB=0;
    for(const id of IDS){ const pA=pChoiceA(q,id); postA[id]=post[id]*pA; postB[id]=post[id]*(1-pA); sumA+=postA[id]; sumB+=postB[id]; }
    for(const id of IDS){ postA[id]= sumA>0?postA[id]/sumA:0; postB[id]= sumB>0?postB[id]/sumB:0; }
    const EH = choiceProbability*entropy(postA) + (1-choiceProbability)*entropy(postB);
    const gain = H0 - EH;
    if(gain>bestGain){ bestGain=gain; best=q; }
  }
  return best;
}

function applyAnswer(q, a){

}

  S.answers.push({qid:q.id, answer:key, choiceText:choiceText(q,key), tMs:Math.round(performance.now()-S.qStart)});
  applyAnswer(q, a);
  if(q.scored!==false && (key==='a' || key==='b' || key==='yes' || key==='no')) S.stepsForStop++;

  if(S.phase==='fixed'){
    S.fixedIdx++;
    if(S.fixedIdx < FIXED.length){ renderQuestion(FIXED[S.fixedIdx]); return; }
    S.phase='dynamic';
  }
  if(S.phase==='dynamic'){
    S.askedDynamic.add(q.id); // 방금 답한 동적 문항 기록 (fixed는 무시됨)
  }
  // 종료 조건 판단
  const post = softmax(S.logscore);
  const conf = confidenceOf(post);
  const nonSafety = scoredEmotionAnswerCount();
  const remaining = DYNAMIC.filter(d=>!S.askedDynamic.has(d.id) && questionApplies(d)).length;
  const earlyStop = (S.stepsForStop>=MIN_STEPS_EARLY) && conf.cls==='high';
  const hardStop = nonSafety>=S.hardCap || remaining===0;

  if(S.phase==='dynamic' && !earlyStop && !hardStop){
    const nq = nextDynamic(post, S.askedDynamic);
    if(nq){ renderQuestion(nq); return; }
  }
  // 강도(첫 회차만) → 결과. 재질문(강도 이미 입력됨)은 바로 결과로.
  if(S.intensity!=null){ finishToResult(); } else { renderIntensity(); }
}

/* ---------- 강도 ---------- */
function renderIntensity(){
  S.phase='intensity'; S.qStart=performance.now();
  const labels=[['0','거의 없음'],['1','약함'],['2','보통'],['3','강함'],['4','아주 강함']];
  app.innerHTML=`
  <section class="card">
    <div class="clue-count no-print">거의 다 왔어요</div>
    <h2>${questionHTML(INTENSITY_Q)}</h2>
    <div class="likert">
      ${labels.map(([v,t])=>`<button class="btn" data-v="${v}">${v}<small>${t}</small></button>`).join('')}
    </div>
  </section>`;
  app.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{
    S.intensity=parseInt(b.dataset.v,10);
    S.answers.push({qid:'q_intensity', answer:b.dataset.v, tMs:Math.round(performance.now()-S.qStart)});
    finishToResult();
  });
}

/* ---------- 결과: 3단계 (감정 → 욕구 → 최종) ---------- */
function finishToResult(){ S.phase='result'; S.finishedAt=new Date().toISOString(); saveSession(); renderEmotionResult(); }

/* 1단계: 감정 결과 (후보 확인 → 그 감정이 알려주는 것으로 자동 진행) */
function renderEmotionResult(){
  const post = softmax(S.logscore);
  const r = ranked(post);
  const conf = confidenceOf(post);
  const top3 = r.slice(0,3);
  const mixed = (r[0].p - r[1].p) < MIX_GAP;
  const clues = S.answers.map(clueForAnswer).filter(Boolean);
  const bars = top3.map(x=>{
    const e=EMAP[x.id]; const pct=Math.round(x.p*100);

  }).join('');
  const confNote = conf.cls==='low'
    ? `<p class="caption">후보들이 서로 비슷해서 <b>아직 분명하지 않아요.</b> 맞는 감정이 없으면 아래 <b>“다른 감정 찾기”</b>로 더 좁혀볼 수 있어요.</p>`
    : mixed ? `<p class="caption"><b>혼합감정</b>일 수 있어요 — 위 두 감정이 함께 느껴지는 상태로 보입니다.</p>` : '';
  app.innerHTML=`
  <section class="card">

    <span class="badge ${conf.cls}">잘 맞는 정도 ${conf.level}</span>
    ${confNote}
    ${bars}
    ${clues.length?`<div style="margin-top:12px"><div class="caption">모은 단서</div><div class="chips">${clues.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div>`:''}
    <div class="no-print" style="margin-top:20px;border-top:1px solid var(--line);padding-top:16px;">
      <div class="caption">이 중 가장 가까운 감정을 골라 주세요. 그 감정이 <b>무엇을 알려주는지</b> 이어서 함께 찾아볼게요.</div>
      <div class="confirm-opts" id="confirmOpts">
        ${top3.map(x=>{
          const detail = detailCandidates(x.id, 1)[0];
          return `<button class="btn small" data-cid="${x.id}">${detail?safeText(detail.term):EMAP[x.id].name} — 이게 가까워요${detail?`<span class="btn-desc">${safeText(detail.kid)}</span>`:''}</button>`;
        }).join('')}
        <button class="btn small ghost" id="reqOther">셋 다 아니에요 · 다른 감정 찾기</button>
      </div>
    </div>
  </section>`;
  app.querySelectorAll('[data-cid]').forEach(b=>b.onclick=()=>{ recordConfirm(b.dataset.cid, r); startNeedFlow(b.dataset.cid); });
  document.getElementById('reqOther').onclick=()=>requeryDifferent(r);
}
function recordConfirm(cid, r){
  S.userConfirmed = cid; S.confirmedEmotion = cid;
  S.detailEmotion = detailCandidates(cid, 1)[0] || null;
  if(r[0].id===cid) S.userConfirmMatch='top1';
  else if(r.slice(0,3).some(x=>x.id===cid)) S.userConfirmMatch='top3';
  else S.userConfirmMatch='miss';
  updateSession();
}
/* 셋 다 아니면: 현재 상위 후보를 제외하고 몇 문항 더 물어 다른 감정을 찾는다 */
function requeryDifferent(r){
  S.requeries=(S.requeries||0)+1;
  r.slice(0,3).forEach(x=>{ S.excluded.add(x.id); S.logscore[x.id]=-1e9; });
  const poolLeft = IDS.filter(id=> S.logscore[id] > -1e8);
  if(poolLeft.length < 2 || S.requeries > 4){
    alert('후보 감정을 거의 다 확인했어요. 처음부터 다시 해보는 게 더 정확해요.');
    resetState(); renderIntro(); return;
  }
  S.phase='dynamic';
  const answered = scoredEmotionAnswerCount();
  S.hardCap = answered + 3;
  const remaining = DYNAMIC.filter(d=>!S.askedDynamic.has(d.id) && questionApplies(d));
  if(remaining.length){
    const nq = nextDynamic(softmax(S.logscore), S.askedDynamic);
    if(nq){ renderQuestion(nq); return; }
  }
  finishToResult();
}

/* 2단계: 욕구 미니탐정 (감정 A/B 답변을 사전확률로, 욕구는 쌍대비교) */
const NEED_PAIR_A=0.82, NEED_PAIR_B=0.18, NEED_PAIR_MIXED=0.65, NEED_PAIR_NEITHER=0.35;
function needSoftmax(score,cand){ const v=cand.map(id=>score[id]||0); const m=Math.max(...v); const e=v.map(x=>Math.exp(x-m)); const s=e.reduce((a,b)=>a+b,0); const o={}; cand.forEach((id,i)=>o[id]=s>0?e[i]/s:1/cand.length); return o; }
function needRanked(post,cand){ return cand.map(id=>({id,p:post[id]})).sort((a,b)=>b.p-a.p); }
function needEntropy(post,cand){ let h=0; for(const id of cand){const p=post[id]; if(p>1e-9)h-=p*Math.log(p);} return h; }
function needPairKey(needA, needB){ return [needA, needB].sort().join('__'); }
function needChoiceText(needId, positive){
  const entry = NEED_Q_MAP[needId];
  if(!entry) return NEEDS[needId] ? NEEDS[needId].kid : needId;
  return positive ? entry.met : entry.unmet;
}
function pNeedChoiceA(needId, q){
  if(needId===q.needA) return NEED_PAIR_A;
  if(needId===q.needB) return NEED_PAIR_B;
  return P_NEUTRAL;
}
function computeNeedPrior(emotionId){
  const cand=(EMO_NEEDS[emotionId]||[]).slice(); const score={}; cand.forEach(id=>score[id]=0);
  for(const a of S.answers){
    const key = answerKey(a.answer);
    if(key!=='a' && key!=='b') continue;
    const ns=(ANSWER_NEED_BY_CHOICE[a.qid] || {})[key]; if(!ns) continue;
    for(const n of ns){ if(n in score) score[n]+=Math.log(1.9); }
  }
  return {cand, score};
}
function nextNeedQuestion(){
  const cand=S.needCand; const post=needSoftmax(S.needScore,cand); const H0=needEntropy(post,cand);
  let best=null,bg=-1e9;
  for(let left=0; left<cand.length; left++){
    for(let right=left+1; right<cand.length; right++){
      const needA = cand[left], needB = cand[right];
      const pairId = needPairKey(needA, needB);
      if(S.askedNeed.has(pairId)) continue;
      const q = {id:pairId, needA, needB};
      let pA=0; for(const id of cand) pA+=post[id]*pNeedChoiceA(id,q);
      const postA={},postB={}; let sumA=0,sumB=0;
      for(const id of cand){ const t=pNeedChoiceA(id,q); postA[id]=post[id]*t; postB[id]=post[id]*(1-t); sumA+=postA[id]; sumB+=postB[id]; }
      for(const id of cand){ postA[id]=sumA>0?postA[id]/sumA:0; postB[id]=sumB>0?postB[id]/sumB:0; }
      const closeness = 1 - Math.abs((post[needA] || 0) - (post[needB] || 0));
      const priority = ((post[needA] || 0) + (post[needB] || 0)) * 0.04 + closeness * 0.01;
      const g=H0-(pA*needEntropy(postA,cand)+(1-pA)*needEntropy(postB,cand)) + priority;
      if(g>bg){bg=g;best=q;}
    }
  }
  return best;
}
function startNeedFlow(emotionId){
  const {cand,score}=computeNeedPrior(emotionId);
  S.confirmedEmotion=emotionId; S.needCand=cand; S.needScore=score; S.askedNeed=new Set(); S.needSteps=0; S.needAnswers=[];
  if(cand.length<=1){ renderFinalResult(); return; }
  const nq=nextNeedQuestion();
  if(nq) renderNeedQuestion(nq); else renderFinalResult();
}
function renderNeedQuestion(q){
  S.qStart=performance.now();
  const emo=EMAP[S.confirmedEmotion]; const pleasant=emo.v>0;
  const lead = pleasant
    ? '앞에서 떠올린 실제 일을 생각해 보세요. 마음의 이름보다 쉬운 설명을 읽고 골라 주세요.'
    : '앞에서 떠올린 실제 일을 생각해 보세요. 마음의 이름보다 쉬운 설명을 읽고 골라 주세요.';
  const stepTitle = '2단계 · 마음을 더 자세히 보기';
  const prompt = pleasant
    ? '지금 좋은 마음에서 더 채워졌다고 느끼는 쪽은 어디인가요?\n\n지금 내 마음은 어느 쪽에 더 가까운가요?'
    : '지금 힘든 마음에서 더 필요했거나 부족했던 쪽은 어디인가요?\n\n지금 내 마음은 어느 쪽에 더 가까운가요?';
  app.innerHTML=`
  <section class="card">
    <div class="no-print"><div class="clue-count">${stepTitle}</div></div>
    <p class="caption" style="margin-top:2px">${lead}</p>
    <h2>${questionHTML(prompt)}</h2>
    <div class="choice-grid">
      <button class="btn choice-btn" data-choice="a"><span class="choice-letter">A</span><span class="choice-copy"><span>${safeText(needChoiceText(q.needA, pleasant))}</span><b>A에 더 가까워요</b></span></button>
      <button class="btn choice-btn" data-choice="b"><span class="choice-letter">B</span><span class="choice-copy"><span>${safeText(needChoiceText(q.needB, pleasant))}</span><b>B에 더 가까워요</b></span></button>
    </div>
    <div class="choice-actions">
      <button class="btn ghost" data-choice="mixed">둘 다 비슷해요</button>
      <button class="btn ghost" data-choice="neither">둘 다 아닌 것 같아요</button>
    </div>
  </section>`;
  app.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>answerNeed(q,b.dataset.choice));
}
function answerNeed(q,a){
  const key = answerKey(a);
  const selectedNeed = key==='a' ? q.needA : key==='b' ? q.needB : null;
  const pleasant = EMAP[S.confirmedEmotion].v>0;
  const selectedText = selectedNeed ? needChoiceText(selectedNeed, pleasant) : choiceText(null, key);
  S.needAnswers.push({pairId:q.id, needA:q.needA, needB:q.needB, need:selectedNeed, answer:key, selectedNeed, choiceText:selectedText, tMs:Math.round(performance.now()-S.qStart)});
  if(key==='a' || key==='b'){
    for(const id of S.needCand) S.needScore[id]+=Math.log(key==='a' ? pNeedChoiceA(id,q) : (1-pNeedChoiceA(id,q)));
  }else if(key==='mixed'){
    for(const id of S.needCand) S.needScore[id]+=Math.log((id===q.needA || id===q.needB) ? NEED_PAIR_MIXED : P_NEUTRAL);
  }else if(key==='neither'){
    for(const id of S.needCand) S.needScore[id]+=Math.log((id===q.needA || id===q.needB) ? NEED_PAIR_NEITHER : P_NEUTRAL);
  }
  S.askedNeed.add(q.id); if(key==='a' || key==='b') S.needSteps++;
  const post=needSoftmax(S.needScore,S.needCand); const rn=needRanked(post,S.needCand);
  const remaining=(S.needCand.length*(S.needCand.length-1)/2) - S.askedNeed.size;
  const clear = S.needSteps>=2 && rn[0].p>=0.6;
  const cap = S.needAnswers.length>=4;
  if(!clear && !cap && remaining>0){ const nq=nextNeedQuestion(); if(nq){ renderNeedQuestion(nq); return; } }
  renderFinalResult();
}

/* 한글 조사(은/는, 이/가) 받침 기준 자동 선택 */
function questionHTML(text){ return safeText(text).replace(/\n/g,'<br>'); }
function hasBatchim(w){ if(!w) return false; const c=w.charCodeAt(w.length-1); if(c<0xAC00||c>0xD7A3) return false; return (c-0xAC00)%28!==0; }
function josa(w,a,b){ return hasBatchim(w)?a:b; }

/* 3단계: 최종 결과 (감정 + 욕구 + 작은 실천) */

    ${showYellow?`<div class="yellow-banner">요즘 힘든 상태가 이어진다면 전문상담이 도움이 될 수 있어요. 가까운 정신건강복지센터나 <b>109</b> 상담을 이용해 보세요.</div>`:''}
    <div class="notice">이 결과는 확정된 감정·욕구가 아니라 <b>참고용</b>이며, 의료적 진단·치료를 대신하지 않습니다.</div>
    <div class="print-only notice">도움 연결 · 24시간 : 109 · 1577-0199 · 1388 · 119</div>
    <div class="no-print btn-row" style="margin-top:16px;">

  document.getElementById('compareSimilar')?.addEventListener('click',()=>document.getElementById('similarSection')?.scrollIntoView({behavior:'smooth'}));
  document.getElementById('reviewCandidates')?.addEventListener('click',()=>renderEmotionResult());

/* =========================== 저장/로그 =========================== */
const LKEY='gamjeong_logs';

function writeLogs(a){ try{localStorage.setItem(LKEY, JSON.stringify(a));}catch(e){} }
function sessionRecord(){

function updateSession(){ const a=loadLogs(); const i=a.findIndex(x=>x.sessionId===S.sessionId); if(i>=0){ const record=sessionRecord(); a[i]=record; writeLogs(a); submitSessionRecord(record);} }

/* 내보내기 */
function download(name, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const el=document.createElement('a'); el.href=url; el.download=name; el.click(); URL.revokeObjectURL(url);

function fmtDate(iso){ try{ return new Date(iso).toLocaleString('ko-KR',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso||''; } }
function emName(id){ return (EMAP[id] && EMAP[id].name) || id || '-'; }
function safeText(value){
  const entities={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return String(value==null?'':value).replace(/[&<>"']/g, character=>entities[character]);
}
function logEmotionInfo(record, topResult){
  const emotionId=record.confirmedEmotion || record.userConfirmed || (topResult && topResult.emotion) || record.top1 || null;
  const emotion=emotionId ? EMAP[emotionId] : null;
  return {
    id:emotionId,
    name:record.detailEmotionTerm || record.emotionName || (emotion ? emotion.name : emName(emotionId)),
    kid:record.detailEmotionKid || record.emotionKid || (emotion ? emotion.kid : ''),
    coreName:record.emotionName || (emotion ? emotion.name : emName(emotionId))
  };
}
function logNeedInfo(record, emotionInfo){
  const needId=record.needUnclear ? null : (record.needConfirmed || record.needTop || null);
  const need=needId ? NEEDS[needId] : null;
  const emotion=emotionInfo && emotionInfo.id ? EMAP[emotionInfo.id] : null;
  const fallbackRelated = emotionInfo && emotionInfo.id ? relatedNeedIds(emotionInfo.id, []) : [];
  const relatedIds = Array.isArray(record.relatedNeedIds) && record.relatedNeedIds.length ? record.relatedNeedIds.filter(id=>NEEDS[id]) : fallbackRelated;
  const relatedNeedInfos = relatedIds.map(id=>NEEDS[id]).filter(Boolean);
  return {
    id:needId,
    name:record.needName || record.need || (need ? need.name : ''),
    kid:record.needKid || (need ? need.kid : ''),
    relatedIds,
    relatedNeedNames:Array.isArray(record.relatedNeedNames) && record.relatedNeedNames.length ? record.relatedNeedNames : relatedNeedInfos.map(item=>item.name),
    relatedNeedKids:Array.isArray(record.relatedNeedKids) && record.relatedNeedKids.length ? record.relatedNeedKids : relatedNeedInfos.map(item=>item.kid),
    positive:!!(emotion && emotion.v>0),
    confirmed:!!(record.needConfirmed && !record.needUnclear)
  };
}

    <h1>🔍 감정 탐정 · 내 기록</h1>
    <div class="gen">생성일 ${fmtDate(new Date().toISOString())}</div>
    <div class="rsum"><div><b>${total}</b><span>전체</span></div><div><b>${avgQ}</b><span>평균 질문</span></div><div><b>${t1}/${confirmed}</b><span>첫 후보 일치</span></div></div>
    ${cards}
    <div class="foot">이 기록은 감정 이해·자기기록을 돕는 참고용이며, 의료적 진단·치료를 대신하지 않습니다.<br>도움 연결(24시간): 109 · 1577-0199 · 1388 · 119</div>
  </div>`;
}
/* 내 기록 PDF: 리포트를 화면에 렌더한 뒤(흰 종이 카드) 버튼에서 동기적으로 window.print().
   결과 화면 PDF와 동일한 방식이라 iOS Safari에서도 안정적으로 동작(새 탭·setTimeout 없음). */
function exportRecordsPDF(){
  const logs=loadLogs();
  logOverlay.classList.remove('on');
  app.innerHTML = `
  <section class="rpwrap">
    ${buildReportHTML(logs)}
    <div class="no-print rpbtns">
      <button class="btn primary" id="recPdf">📄 PDF로 저장 · 인쇄</button>
      <button class="btn" id="recBack">닫기</button>
    </div>
    <p class="caption no-print" style="margin-top:10px;">아이폰: 위 버튼을 누르면 인쇄 미리보기가 열려요 → 두 손가락으로 벌려 확대 → 공유 아이콘으로 PDF 저장.</p>
  </section>`;
  document.getElementById('recPdf').onclick=()=>window.print();
  document.getElementById('recBack').onclick=()=>{ resetState(); renderIntro(); };
  try{ window.scrollTo(0,0); }catch(e){}
}

function buildLogPreviewCard(record){
  if(record.crisis){
    return `<div class="log-card"><div class="log-title"><span>${safeText(fmtDate(record.startedAt))}</span><span>안전 확인</span></div><p class="caption" style="margin:6px 0 0;">안전 확인으로 마친 기록이에요.</p></div>`;
  }
  const topResult=(record.posteriorFinal||[])[0];
  const emotionInfo=logEmotionInfo(record, topResult);
  const needInfo=logNeedInfo(record, emotionInfo);
  const kidLines=kidLinesHTML(emotionInfo, needInfo);
  return `<div class="log-card">
    <div class="log-title"><span>${safeText(fmtDate(record.startedAt))}</span><span>${safeText(emotionInfo.name||'-')}</span></div>
    ${(needInfo.relatedNeedNames||[]).length?`<p class="caption" style="margin:6px 0 0;">관련 욕구 · <b>${safeText(needInfo.relatedNeedNames.join(' · '))}</b></p>`:(needInfo.name?`<p class="caption" style="margin:6px 0 0;">관련 욕구 · <b>${safeText(needInfo.name)}</b></p>`:'')}
    ${kidLines.length?`<div class="log-kid"><b>쉽게 말하면</b><br>${kidLines.join('<br><br>')}</div>`:''}
  </div>`;
}
function buildLogRecentHTML(logs){
  if(!logs.length) return '';
  const recent=[...logs].sort((left,right)=> new Date(right.startedAt||0) - new Date(left.startedAt||0)).slice(0,3);
  return `<div class="log-recent"><h3>최근 기록 쉽게 보기</h3>${recent.map(record=>buildLogPreviewCard(record)).join('')}</div>`;
}

/* =========================== 오버레이 =========================== */
const helpOverlay=document.getElementById('helpOverlay');
const logOverlay=document.getElementById('logOverlay');
document.getElementById('helpBtn').onclick=()=>helpOverlay.classList.add('on');
document.getElementById('footHelp').onclick=(e)=>{e.preventDefault();helpOverlay.classList.add('on');};
document.getElementById('helpClose').onclick=()=>helpOverlay.classList.remove('on');
helpOverlay.onclick=(e)=>{if(e.target===helpOverlay)helpOverlay.classList.remove('on');};

function openLogModal(){
  const logs=loadLogs();
  const consented=logs.filter(s=>s.consentResearch);
  const top1Match=logs.filter(s=>s.userConfirmMatch==='top1').length;
  const confirmed=logs.filter(s=>s.userConfirmMatch).length;
  const avgQ = logs.length? (logs.reduce((a,s)=>a+(s.questionCount||0),0)/logs.length).toFixed(1):'0';
  document.getElementById('logStats').innerHTML=`
    <div class="kv"><span>전체 세션</span><b>${logs.length}건</b></div>
    <div class="kv"><span>연구 동의 세션</span><b>${consented.length}건</b></div>
    <div class="kv"><span>평균 질문 수</span><b>${avgQ}문</b></div>
    <div class="kv"><span>첫 후보와 일치</span><b>${top1Match}/${confirmed}건</b></div>
    ${buildLogListHTML(logs)}`;
  document.querySelectorAll('[data-log-open]').forEach(card=>{
    card.onclick=()=>showLogDetail(card.dataset.logOpen);
    card.onkeydown=(event)=>{
      if(event.key==='Enter' || event.key===' '){
        event.preventDefault();
        showLogDetail(card.dataset.logOpen);
      }
    };
  });
  logOverlay.classList.add('on');
}
document.getElementById('logClose').onclick=()=>logOverlay.classList.remove('on');
logOverlay.onclick=(e)=>{if(e.target===logOverlay)logOverlay.classList.remove('on');};
document.getElementById('exportPdf').onclick=exportRecordsPDF;
document.getElementById('exportJson').onclick=exportJSON;
document.getElementById('exportCsv').onclick=exportCSV;
document.getElementById('deleteAll').onclick=()=>{
  if(confirm('이 기기에 저장된 모든 감정 탐정 기록을 삭제할까요? 되돌릴 수 없어요.')){
    localStorage.removeItem(LKEY); openLogModal();
  }
};

/* =========================== 시작 =========================== */
resetState();
Promise.all([loadEmotionDatabase(), loadNeedWordDatabase()]).finally(renderIntro);
</script>
</body>
</html>
